<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparade rapporter</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#0f0e17;color:#f0eee8;min-height:100vh;padding:48px 24px 80px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;margin-bottom:8px;color:#c9a84c;}
  .subtitle{font-size:14px;color:#8b8a9e;margin-bottom:32px;}
  a.back{display:inline-block;margin-bottom:24px;font-size:14px;color:#8b8a9e;text-decoration:none;}
  table{width:100%;border-collapse:collapse;background:#1a1928;border-radius:12px;overflow:hidden;}
  th{background:#22213a;color:#8b8a9e;text-align:left;padding:12px 16px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;}
  td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);font-size:14px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .badge{display:inline-block;padding:3px 12px;border-radius:100px;font-size:11px;font-weight:600;background:rgba(201,168,76,0.15);color:#c9a84c;border:1px solid rgba(201,168,76,0.25);}
  .btn{display:inline-block;padding:6px 16px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:opacity 0.15s;}
  .btn-pdf{background:linear-gradient(135deg,#c9a84c,#e8c97a);color:#1a1200;margin-right:6px;}
  .btn-del{background:rgba(191,124,124,0.15);color:#bf7c7c;border:1px solid rgba(191,124,124,0.25);}
  .btn:hover{opacity:0.8;}
  .loading{color:#8b8a9e;padding:40px 0;text-align:center;}
  .empty{color:#8b8a9e;padding:40px 0;text-align:center;}

  /* PDF modal */
  #pdf-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(10,9,20,0.92);overflow-y:auto;padding:30px 20px;}
  .pdf-modal{background:#fff;color:#1a1928;max-width:760px;margin:0 auto;border-radius:12px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.6);}
  .pdf-topbar{background:#1a1928;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;}
  .pdf-topbar span{font-size:13px;color:#8b8a9e;}
  .pdf-actions{display:flex;gap:10px;}
  .btn-print{background:linear-gradient(135deg,#c9a84c,#e8c97a);color:#1a1200;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:9px 22px;border:none;border-radius:100px;cursor:pointer;}
  .btn-close-pdf{background:transparent;color:#8b8a9e;font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 18px;border:1px solid rgba(255,255,255,0.1);border-radius:100px;cursor:pointer;}
  .btn-close-pdf:hover{color:#f0eee8;}
  .pdf-body{padding:48px 56px 56px;font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.7;color:#1a1928;}
  .pdf-header-block{background:#0f0e17;color:#f0eee8;padding:26px 30px;border-radius:8px;margin-bottom:28px;}
  .pdf-header-block h1{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:#c9a84c;margin-bottom:4px;}
  .pdf-header-block p{font-size:11px;color:#8b8a9e;}
  .pdf-section-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:#0f0e17;margin:26px 0 12px;padding-bottom:6px;border-bottom:2px solid #c9a84c;}
  .pdf-body h3{font-family:'Cormorant Garamond',serif;font-size:16px;margin:18px 0 6px;}
  .pdf-body p{margin-bottom:10px;}
  .pdf-body ul{padding-left:20px;margin-bottom:10px;}
  .pdf-footer{margin-top:40px;padding-top:16px;border-top:1px solid #e0ddf0;display:flex;justify-content:space-between;font-size:10px;color:#8b8a9e;}

  @media print{
    body{display:none!important;}
    #pdf-overlay{display:block!important;position:static!important;background:none!important;padding:0!important;}
    .pdf-topbar{display:none!important;}
    .pdf-modal{box-shadow:none!important;border-radius:0!important;}
  }
</style>
</head>
<body>
<a href="/" class="back">&#8592; Tillbaka till huvudmenyn</a>
<h1>Sparade rapporter</h1>
<p class="subtitle">Alla genomförda tester med AI-analys</p>
<div id="content" class="loading">Laddar...</div>

<div id="pdf-overlay">
  <div class="pdf-modal">
    <div class="pdf-topbar">
      <span>Förhandsgranskning</span>
      <div class="pdf-actions">
        <button class="btn-print" onclick="window.print()">Skriv ut / Spara PDF</button>
        <button class="btn-close-pdf" onclick="document.getElementById('pdf-overlay').style.display='none'">Stäng</button>
      </div>
    </div>
    <div class="pdf-body" id="pdf-body"></div>
  </div>
</div>

<script>
let allRows = [];

async function load() {
  const el = document.getElementById('content');
  try {
    const res = await fetch('/api/results');
    allRows = await res.json();
    render();
  } catch(e) {
    el.innerHTML = `<p style="color:#bf7c7c">Kunde inte hämta rapporter: ${e.message}</p>`;
  }
}

function render() {
  const el = document.getElementById('content');
  if (!allRows.length) { el.innerHTML = '<p class="empty">Inga rapporter sparade ännu.</p>'; return; }

  const html = `<table>
    <thead><tr><th>#</th><th>Namn</th><th>Test</th><th>Datum</th><th>Åtgärder</th></tr></thead>
    <tbody>${allRows.map((r, i) => `
      <tr id="row-${r.id}">
        <td style="color:#8b8a9e">${i + 1}</td>
        <td>${esc(r.name)}</td>
        <td><span class="badge">${esc(r.test_type)}</span></td>
        <td style="color:#8b8a9e">${new Date(r.created_at).toLocaleString('sv-SE')}</td>
        <td>
          <button class="btn btn-pdf" onclick="showPDF(${r.id})">PDF</button>
          <button class="btn btn-del" onclick="deleteRow(${r.id})">Radera</button>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>`;
  el.innerHTML = html;
}

function showPDF(id) {
  const r = allRows.find(x => x.id === id);
  if (!r) return;
  const dateStr = new Date(r.created_at).toLocaleDateString('sv-SE', {year:'numeric',month:'long',day:'numeric'});
  const analysisHtml = r.report
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^[\-•] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)/g, m => `<ul>${m}</ul>`)
    .replace(/<\/ul>\s*<ul>/g, '')
    .split('\n').map(l => (!l.startsWith('<') && l.trim()) ? `<p>${l}</p>` : l).join('\n');

  document.getElementById('pdf-body').innerHTML = `
    <div class="pdf-header-block">
      <h1>${esc(r.test_type)} · Rapport</h1>
      <p>${esc(r.name)} &nbsp;·&nbsp; ${dateStr} &nbsp;·&nbsp; Konfidentiellt</p>
    </div>
    <div class="pdf-section-title">AI-analys</div>
    ${analysisHtml}
    <div class="pdf-footer">
      <span>${esc(r.test_type)} · ${esc(r.name)}</span>
      <span>${dateStr}</span>
    </div>`;

  document.getElementById('pdf-overlay').style.display = 'block';
  document.getElementById('pdf-overlay').scrollTop = 0;
}

async function deleteRow(id) {
  if (!confirm('Radera denna rapport permanent?')) return;
  const res = await fetch('/api/delete-result', {
    method: 'DELETE',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id})
  });
  if (res.ok) {
    allRows = allRows.filter(r => r.id !== id);
    render();
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
</script>
</body>
</html>
